services:
  - type: web
    name: scip-rag-backend
    runtime: python
    rootDir: backend
    filter:
      paths:
        - backend/**
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: VECTOR_STORE_ID
        value: vs_69d7ea3f2f5c8191abfee9317ddcb1b8
      - key: PYTHON_VERSION
        value: "3.11"
      - key: PYTHONUNBUFFERED
        value: "1"

  - type: web
    name: scip-workflow-proxy
    runtime: node
    rootDir: workflow-proxy
    filter:
      paths:
        - workflow-proxy/**
    buildCommand: npm install
    startCommand: node index.js
    plan: starter
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: VECTOR_STORE_ID
        value: vs_69d7ea3f2f5c8191abfee9317ddcb1b8
      - key: PROXY_SECRET
        sync: false
